spring:
  profiles:
    active: dev
  application:
    name: blogging-platform
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  graphql:
    graphiql:
      enabled: true
    schema:
      printer:
        enabled: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile

server:
  port: 8082

jwt:
  secret: ${JWT_SECRET:secretsecretsecretsecretsecretsecretsecretsecret}
  expiration: 86400000
